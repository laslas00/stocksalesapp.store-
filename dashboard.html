<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/supabase-js@2"></script>
  <style>
    body { font-family: Arial; margin: 20px; background: #f5f5f5; }
    .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
    h1 { color: #333; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: #f9f9f9; padding: 15px; border-radius: 8px; text-align: center; }
    .stat-number { font-size: 2em; font-weight: bold; color: #0070f3; }
    .chart-container { margin-bottom: 40px; }
    canvas { max-height: 400px; }
    .login { max-width: 300px; margin: 100px auto; text-align: center; }
    input, button { padding: 10px; margin: 5px; width: 90%; }
  </style>
</head>
<body>
<div id="app">
  <div class="login" id="loginPanel">
    <h2>Dashboard Login</h2>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Login</button>
  </div>
  <div id="dashboardContent" style="display:none;">
    <div class="container">
      <h1>Visitor Analytics Dashboard</h1>
      <div class="stats-grid" id="summaryStats"></div>
      <div class="chart-container"><canvas id="browserChart"></canvas></div>
      <div class="chart-container"><canvas id="deviceChart"></canvas></div>
      <div class="chart-container"><canvas id="osChart"></canvas></div>
      <div class="chart-container"><canvas id="visitorsOverTime"></canvas></div>
      <div class="chart-container"><canvas id="topCountries"></canvas></div>
    </div>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://zexxdoxuzvkovszfqcio.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_svIdBFlhG9fG8zlOsMcs-g_kqUWBT8W';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const DASHBOARD_PASSWORD = 'Doaswedo*123'; // Change this to something secure

  function checkPassword() {
    const pwd = document.getElementById('passwordInput').value;
    if (pwd === DASHBOARD_PASSWORD) {
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('dashboardContent').style.display = 'block';
      loadData();
    } else {
      alert('Wrong password');
    }
  }

  async function loadData() {
    // Fetch all visits
    const { data, error } = await supabase.from('visits').select('*');
    if (error) {
      console.error(error);
      return;
    }

    // Summary stats
    const uniqueVisitors = new Set(data.map(v => v.visitor_id)).size;
    const totalPageViews = data.length;
    document.getElementById('summaryStats').innerHTML = `
      <div class="stat-card"><div class="stat-number">${uniqueVisitors}</div><div>Unique Visitors</div></div>
      <div class="stat-card"><div class="stat-number">${totalPageViews}</div><div>Total Page Views</div></div>
      <div class="stat-card"><div class="stat-number">${data.filter(v => v.device_type === 'mobile').length}</div><div>Mobile Visits</div></div>
      <div class="stat-card"><div class="stat-number">${data.filter(v => v.device_type === 'desktop').length}</div><div>Desktop Visits</div></div>
    `;

    // Browser chart
    const browserCounts = {};
    data.forEach(v => { browserCounts[v.browser] = (browserCounts[v.browser] || 0) + 1; });
    new Chart(document.getElementById('browserChart'), { type: 'bar', data: { labels: Object.keys(browserCounts), datasets: [{ label: 'Visits', data: Object.values(browserCounts), backgroundColor: 'blue' }] } });

    // Device chart
    const deviceCounts = {};
    data.forEach(v => { deviceCounts[v.device_type] = (deviceCounts[v.device_type] || 0) + 1; });
    new Chart(document.getElementById('deviceChart'), { type: 'pie', data: { labels: Object.keys(deviceCounts), datasets: [{ data: Object.values(deviceCounts) }] } });

    // OS chart
    const osCounts = {};
    data.forEach(v => { osCounts[v.os] = (osCounts[v.os] || 0) + 1; });
    new Chart(document.getElementById('osChart'), { type: 'bar', data: { labels: Object.keys(osCounts), datasets: [{ label: 'Visits', data: Object.values(osCounts) }] } });

    // Time series (last 7 days)
    const last7Days = [...Array(7)].map((_, i) => new Date(Date.now() - i*86400000).toISOString().slice(0,10)).reverse();
    const dailyCounts = last7Days.map(day => data.filter(v => v.visited_at.slice(0,10) === day).length);
    new Chart(document.getElementById('visitorsOverTime'), { type: 'line', data: { labels: last7Days, datasets: [{ label: 'Page Views', data: dailyCounts }] } });

    // Top countries
    const countryCounts = {};
    data.forEach(v => { if (v.country) countryCounts[v.country] = (countryCounts[v.country] || 0) + 1; });
    const sortedCountries = Object.entries(countryCounts).sort((a,b) => b[1]-a[1]).slice(0,5);
    new Chart(document.getElementById('topCountries'), { type: 'bar', data: { labels: sortedCountries.map(c=>c[0]), datasets: [{ label: 'Visits', data: sortedCountries.map(c=>c[1]) }] } });
  }
</script>
</body>
</html>
